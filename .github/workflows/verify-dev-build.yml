name: Verify Dev Build

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  validate-verify-inputs:
    name: Validate verify inputs
    runs-on: ubuntu-latest
    environment: dev
    outputs:
      backend_url: ${{ steps.capture-vars.outputs.backend_url }}
      frontend_url: ${{ steps.capture-vars.outputs.frontend_url }}
    steps:
      - name: Validate required variables
        shell: bash
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          SMOKE_ADMIN_EMP_NO: ${{ vars.SMOKE_ADMIN_EMP_NO }}
          SMOKE_OPERATOR_EMP_NO: ${{ vars.SMOKE_OPERATOR_EMP_NO }}
          SMOKE_SUPERVISOR_EMP_NO: ${{ vars.SMOKE_SUPERVISOR_EMP_NO }}
          SMOKE_SUPERVISOR_PIN: ${{ secrets.SMOKE_SUPERVISOR_PIN }}
          PERF_EMP_NO: ${{ secrets.PERF_EMP_NO }}
          PERF_PIN: ${{ secrets.PERF_PIN }}
          PERF_SITE_ID: ${{ secrets.PERF_SITE_ID }}
        run: |
          set -euo pipefail
          for name in BACKEND_URL FRONTEND_URL SMOKE_ADMIN_EMP_NO SMOKE_OPERATOR_EMP_NO SMOKE_SUPERVISOR_EMP_NO SMOKE_SUPERVISOR_PIN PERF_EMP_NO PERF_PIN PERF_SITE_ID; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required value: ${name}" >&2
              exit 1
            fi
          done

      - name: Capture validated URLs
        id: capture-vars
        shell: bash
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
        run: |
          set -euo pipefail
          echo "backend_url=${BACKEND_URL}" >> "$GITHUB_OUTPUT"
          echo "frontend_url=${FRONTEND_URL}" >> "$GITHUB_OUTPUT"

  detect-operator-impact:
    name: Detect operator-impacting changes
    needs: [validate-verify-inputs]
    runs-on: ubuntu-latest
    outputs:
      run_operator_smoke: ${{ steps.filter.outputs.operator_impact }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            operator_impact:
              - 'backend/**'
              - 'frontend/src/components/layout/**'
              - 'frontend/src/components/login/**'
              - 'frontend/src/components/tabletSetup/**'
              - 'frontend/src/features/rolls/**'
              - 'frontend/src/features/rollsMaterial/**'
              - 'frontend/src/features/longSeam/**'
              - 'frontend/src/features/longSeamInsp/**'
              - 'frontend/src/features/fitup/**'
              - 'frontend/src/features/fitupQueue/**'
              - 'frontend/src/features/roundSeam/**'
              - 'frontend/src/features/roundSeamInsp/**'
              - 'frontend/src/features/nameplate/**'
              - 'frontend/src/features/hydro/**'
              - 'frontend/src/features/spotXray/**'
              - 'frontend/src/features/rtXrayQueue/**'
              - 'frontend/src/api/**'
              - 'frontend/src/types/**'
              - '.github/workflows/**'

  build-test-package:
    name: Build, test, and package dev commit
    needs: [validate-verify-inputs, detect-operator-impact]
    uses: ./.github/workflows/build-test-package.yml
    with:
      release_ref: ${{ github.sha }}
      backend_url: ${{ needs.validate-verify-inputs.outputs.backend_url }}
      frontend_url: ${{ needs.validate-verify-inputs.outputs.frontend_url }}
      run_e2e: ${{ needs.detect-operator-impact.outputs.run_operator_smoke == 'true' }}
      operator_smoke_timeout_minutes: 8
      coverage_storage_connection_string: ${{ vars.COVERAGE_STORAGE_CONNECTION_STRING }}
    secrets: inherit
