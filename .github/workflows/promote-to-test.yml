name: Promote to Test

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm promoting to Test'
        required: true
        type: string
      source_run_id:
        description: "Run ID from 'Build & Deploy to Dev' that produced release artifacts"
        required: true
        type: string
      db_strategy:
        description: "Database strategy for Test"
        required: true
        type: choice
        default: seed-only
        options:
          - seed-only
          - copy-prod

env:
  PROD_RESOURCE_GROUP: rg-qscmes-prod
  PROD_SQL_SERVER: qscmes-prod-sql
  PROD_DB_NAME: QSCMES-Prod
  TEST_RESOURCE_GROUP: rg-qscmes-test
  TEST_SQL_SERVER: qscmes-test-sql
  TEST_DB_NAME: QSCMES-Test
  STORAGE_ACCOUNT: qscmesbacpacs
  STORAGE_CONTAINER: bacpacs

jobs:
  validate-promotion-inputs:
    name: Validate test promotion inputs
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}
    environment: test
    steps:
      - name: Validate required variables and secrets
        shell: bash
        env:
          DB_STRATEGY: ${{ github.event.inputs.db_strategy }}
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          BACKEND_APP_NAME: ${{ vars.BACKEND_APP_NAME }}
          SMOKE_EMP_NO: ${{ vars.SMOKE_EMP_NO }}
          SOURCE_RUN_ID: ${{ github.event.inputs.source_run_id }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          SWA_DEPLOYMENT_TOKEN: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          SQL_ADMIN_USER: ${{ secrets.SQL_ADMIN_USER }}
          SQL_ADMIN_PASSWORD: ${{ secrets.SQL_ADMIN_PASSWORD }}
        run: |
          set -euo pipefail
          for name in BACKEND_URL FRONTEND_URL BACKEND_APP_NAME SMOKE_EMP_NO SOURCE_RUN_ID AZURE_CREDENTIALS SWA_DEPLOYMENT_TOKEN; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required value: ${name}" >&2
              exit 1
            fi
          done

          if [[ "${DB_STRATEGY}" == "copy-prod" ]]; then
            for name in SQL_ADMIN_USER SQL_ADMIN_PASSWORD; do
              if [[ -z "${!name:-}" ]]; then
                echo "Missing required value for copy-prod strategy: ${name}" >&2
                exit 1
              fi
            done
          fi

  copy-prod-db:
    name: Copy Prod DB to Test
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' && github.event.inputs.db_strategy == 'copy-prod' }}
    needs: [validate-promotion-inputs]
    environment: test

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get storage account key
        id: storage-key
        run: |
          KEY=$(az storage account keys list \
            --resource-group ${{ env.PROD_RESOURCE_GROUP }} \
            --account-name ${{ env.STORAGE_ACCOUNT }} \
            --query '[0].value' -o tsv)
          echo "::add-mask::$KEY"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Export production database to BACPAC
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BACPAC_NAME="qscmes-prod-${TIMESTAMP}.bacpac"
          echo "BACPAC_NAME=$BACPAC_NAME" >> "$GITHUB_ENV"

          az sql db export \
            --resource-group ${{ env.PROD_RESOURCE_GROUP }} \
            --server ${{ env.PROD_SQL_SERVER }} \
            --name ${{ env.PROD_DB_NAME }} \
            --admin-user ${{ secrets.SQL_ADMIN_USER }} \
            --admin-password ${{ secrets.SQL_ADMIN_PASSWORD }} \
            --storage-key-type StorageAccessKey \
            --storage-key ${{ steps.storage-key.outputs.key }} \
            --storage-uri "https://${{ env.STORAGE_ACCOUNT }}.blob.core.windows.net/${{ env.STORAGE_CONTAINER }}/${BACPAC_NAME}"

          echo "Exported to ${BACPAC_NAME}"

      - name: Delete existing test database
        run: |
          az sql db delete \
            --resource-group ${{ env.TEST_RESOURCE_GROUP }} \
            --server ${{ env.TEST_SQL_SERVER }} \
            --name ${{ env.TEST_DB_NAME }} \
            --yes || echo "Test database did not exist, continuing..."

      - name: Import BACPAC into test server
        run: |
          az sql db import \
            --resource-group ${{ env.TEST_RESOURCE_GROUP }} \
            --server ${{ env.TEST_SQL_SERVER }} \
            --name ${{ env.TEST_DB_NAME }} \
            --admin-user ${{ secrets.SQL_ADMIN_USER }} \
            --admin-password ${{ secrets.SQL_ADMIN_PASSWORD }} \
            --storage-key-type StorageAccessKey \
            --storage-key ${{ steps.storage-key.outputs.key }} \
            --storage-uri "https://${{ env.STORAGE_ACCOUNT }}.blob.core.windows.net/${{ env.STORAGE_CONTAINER }}/${{ env.BACPAC_NAME }}"

          echo "Import complete. Test database now has production data."

  deploy-test:
    name: Deploy to Test
    needs: [validate-promotion-inputs, copy-prod-db]
    if: ${{ always() && github.event.inputs.confirm == 'yes' && (github.event.inputs.db_strategy != 'copy-prod' || needs.copy-prod-db.result == 'success') }}
    runs-on: ubuntu-latest
    environment: test
    concurrency:
      group: deploy-test
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release manifest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.inputs.source_run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p ./release
          gh run download "$RUN_ID" --repo "$REPOSITORY" --pattern "release-manifest-*" --dir ./release

      - name: Read manifest metadata
        id: manifest
        shell: bash
        run: |
          MANIFEST_FILE="$(ls ./release/*.json | head -1)"
          RELEASE_SHA="$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['releaseSha'])" "$MANIFEST_FILE")"
          BACKEND_ARTIFACT="$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['backendArtifact'])" "$MANIFEST_FILE")"
          FRONTEND_ARTIFACT="$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['frontendArtifact'])" "$MANIFEST_FILE")"

          echo "release_sha=${RELEASE_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_artifact=${BACKEND_ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "frontend_artifact=${FRONTEND_ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Download backend artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.inputs.source_run_id }}
          REPOSITORY: ${{ github.repository }}
          ARTIFACT_NAME: ${{ steps.manifest.outputs.backend_artifact }}
        run: |
          set -euo pipefail
          mkdir -p ./backend
          for attempt in 1 2 3 4 5; do
            if gh run download "$RUN_ID" --repo "$REPOSITORY" --name "$ARTIFACT_NAME" --dir ./backend; then
              exit 0
            fi
            if [[ "$attempt" -eq 5 ]]; then
              echo "Failed to download backend artifact '$ARTIFACT_NAME' after $attempt attempts." >&2
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Download frontend artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.inputs.source_run_id }}
          REPOSITORY: ${{ github.repository }}
          ARTIFACT_NAME: ${{ steps.manifest.outputs.frontend_artifact }}
        run: |
          set -euo pipefail
          mkdir -p ./frontend
          for attempt in 1 2 3 4 5; do
            if gh run download "$RUN_ID" --repo "$REPOSITORY" --name "$ARTIFACT_NAME" --dir ./frontend; then
              exit 0
            fi
            if [[ "$attempt" -eq 5 ]]; then
              echo "Failed to download frontend artifact '$ARTIFACT_NAME' after $attempt attempts." >&2
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Download SLO perf artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ github.event.inputs.source_run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p ./perf/artifacts
          gh run download "$RUN_ID" --repo "$REPOSITORY" --name perf-artifacts --dir ./perf/artifacts

      - name: Enforce SLO gate before test promotion
        run: python3 .github/scripts/evaluate-slo-gates.py
        env:
          SLO_PERF_SUMMARY_PATH: ./perf/artifacts/perf-summary.json
          SLO_RECON_SUMMARY_PATH: ./perf/artifacts/queue-reconciliation-summary.json

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.BACKEND_APP_NAME }}
          package: ./backend

      - name: Deploy frontend to Azure Static Web Apps
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: ./frontend
          skip_app_build: true

      - name: Summary
        run: |
          echo "## Promotion to Test Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Source run ID**: \`${{ github.event.inputs.source_run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Release SHA**: \`${{ steps.manifest.outputs.release_sha }}\`" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ github.event.inputs.db_strategy }}" == "copy-prod" ]]; then
            echo "- **DB strategy**: Prod DB copied to Test — EF migrations will run on app startup" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **DB strategy**: Seed-only (no Prod DB copy) — EF migrations will run on app startup" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Backend deployed** to \`${{ vars.BACKEND_APP_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend deployed** to Test Static Web App" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Verify the Test environment before promoting to Production." >> $GITHUB_STEP_SUMMARY

  post-deploy-smoke:
    name: Post-deploy smoke checks
    needs: [deploy-test]
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke checks
        shell: bash
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          SMOKE_EMP_NO: ${{ vars.SMOKE_EMP_NO }}
          SMOKE_EMP_PIN: ${{ secrets.SMOKE_EMP_PIN }}
        run: bash .github/scripts/post-deploy-smoke.sh
