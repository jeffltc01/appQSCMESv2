name: Promote to Production

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm promoting to Production (backs up Prod DB, deploys code)'
        required: true
        type: string
      source_run_id:
        description: "Run ID from 'Build & Deploy to Dev' that produced release artifacts"
        required: true
        type: string

env:
  PROD_RESOURCE_GROUP: rg-qscmes-prod
  PROD_SQL_SERVER: qscmes-prod-sql
  PROD_DB_NAME: QSCMES-Prod
  STORAGE_ACCOUNT: qscmesbacpacs
  STORAGE_CONTAINER: bacpacs

jobs:
  validate-promotion-inputs:
    name: Validate production promotion inputs
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}
    environment: production
    steps:
      - name: Validate required variables and secrets
        shell: bash
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          BACKEND_APP_NAME: ${{ vars.BACKEND_APP_NAME }}
          SMOKE_EMP_NO: ${{ vars.SMOKE_EMP_NO }}
          SOURCE_RUN_ID: ${{ github.event.inputs.source_run_id }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          SWA_DEPLOYMENT_TOKEN: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
        run: |
          set -euo pipefail
          for name in BACKEND_URL FRONTEND_URL BACKEND_APP_NAME SMOKE_EMP_NO SOURCE_RUN_ID AZURE_CREDENTIALS SWA_DEPLOYMENT_TOKEN; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required value: ${name}" >&2
              exit 1
            fi
          done

  backup-prod-db:
    name: Backup Prod DB
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'yes' }}
    needs: [validate-promotion-inputs]
    environment: production

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get storage account key
        id: storage-key
        run: |
          KEY=$(az storage account keys list \
            --resource-group ${{ env.PROD_RESOURCE_GROUP }} \
            --account-name ${{ env.STORAGE_ACCOUNT }} \
            --query '[0].value' -o tsv)
          echo "::add-mask::$KEY"
          echo "key=$KEY" >> "$GITHUB_OUTPUT"

      - name: Export production database to BACPAC
        run: |
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          BACPAC_NAME="qscmes-prod-pre-deploy-${TIMESTAMP}.bacpac"
          echo "BACPAC_NAME=$BACPAC_NAME" >> "$GITHUB_ENV"

          az sql db export \
            --resource-group ${{ env.PROD_RESOURCE_GROUP }} \
            --server ${{ env.PROD_SQL_SERVER }} \
            --name ${{ env.PROD_DB_NAME }} \
            --admin-user ${{ secrets.SQL_ADMIN_USER }} \
            --admin-password ${{ secrets.SQL_ADMIN_PASSWORD }} \
            --storage-key-type StorageAccessKey \
            --storage-key ${{ steps.storage-key.outputs.key }} \
            --storage-uri "https://${{ env.STORAGE_ACCOUNT }}.blob.core.windows.net/${{ env.STORAGE_CONTAINER }}/${BACPAC_NAME}"

          echo "Pre-deploy backup exported to ${BACPAC_NAME}"

  deploy-production:
    name: Deploy to Production
    needs: [backup-prod-db]
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release manifest
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.inputs.source_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}
          pattern: release-manifest-*
          path: ./release
          merge-multiple: true

      - name: Read manifest metadata
        id: manifest
        shell: bash
        run: |
          MANIFEST_FILE="$(ls ./release/*.json | head -1)"
          RELEASE_SHA="$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['releaseSha'])" "$MANIFEST_FILE")"
          BACKEND_ARTIFACT="$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['backendArtifact'])" "$MANIFEST_FILE")"
          FRONTEND_ARTIFACT="$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['frontendArtifact'])" "$MANIFEST_FILE")"

          echo "release_sha=${RELEASE_SHA}" >> "$GITHUB_OUTPUT"
          echo "backend_artifact=${BACKEND_ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "frontend_artifact=${FRONTEND_ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.inputs.source_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}
          name: ${{ steps.manifest.outputs.backend_artifact }}
          path: ./backend

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.inputs.source_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}
          name: ${{ steps.manifest.outputs.frontend_artifact }}
          path: ./frontend

      - name: Download SLO perf artifacts
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.inputs.source_run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}
          name: perf-artifacts
          path: ./perf/artifacts

      - name: Enforce SLO gate before production promotion
        run: python3 .github/scripts/evaluate-slo-gates.py
        env:
          SLO_PERF_SUMMARY_PATH: ./perf/artifacts/perf-summary.json
          SLO_RECON_SUMMARY_PATH: ./perf/artifacts/queue-reconciliation-summary.json

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.BACKEND_APP_NAME }}
          package: ./backend

      - name: Deploy frontend to Azure Static Web Apps
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: ./frontend
          skip_app_build: true

      - name: Summary
        run: |
          echo "## Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Source run ID**: \`${{ github.event.inputs.source_run_id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Release SHA**: \`${{ steps.manifest.outputs.release_sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Prod DB backed up** before deployment (BACPAC in \`${{ env.STORAGE_ACCOUNT }}\`)" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend deployed** to \`${{ vars.BACKEND_APP_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend deployed** to Production Static Web App" >> $GITHUB_STEP_SUMMARY
          echo "- **EF migrations** will run automatically on app startup" >> $GITHUB_STEP_SUMMARY

  post-deploy-smoke:
    name: Post-deploy smoke checks
    needs: [deploy-production]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke checks
        shell: bash
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          SMOKE_EMP_NO: ${{ vars.SMOKE_EMP_NO }}
          SMOKE_EMP_PIN: ${{ secrets.SMOKE_EMP_PIN }}
        run: bash .github/scripts/post-deploy-smoke.sh
