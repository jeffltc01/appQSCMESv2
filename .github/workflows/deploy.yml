name: Build & Deploy to Dev

on:
  push:
    branches: [main]

env:
  DOTNET_VERSION: "9.0.x"
  NODE_VERSION: "20"
  BACKEND_PATH: backend/MESv2.Api
  FRONTEND_PATH: frontend

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore & Build
        run: dotnet publish ${{ env.BACKEND_PATH }} -c Release -o ./publish/backend

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend
          path: ./publish/backend

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install & Build
        working-directory: ${{ env.FRONTEND_PATH }}
        env:
          VITE_API_URL: ${{ vars.BACKEND_URL }}
        run: |
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend
          path: ${{ env.FRONTEND_PATH }}/dist

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Run backend tests with coverage
        run: |
          dotnet test backend/MESv2.Api.Tests \
            --configuration Release \
            --verbosity normal \
            --settings backend/MESv2.Api.Tests/coverage.runsettings \
            --collect:"XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Generate backend HTML coverage report
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:./TestResults/**/coverage.cobertura.xml \
            -targetdir:./coverage-reports/backend \
            -reporttypes:HtmlInline

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Run frontend tests with coverage
        working-directory: ${{ env.FRONTEND_PATH }}
        run: |
          npm ci
          npm run test:coverage

      - name: Assemble coverage reports
        run: |
          cp -r ${{ env.FRONTEND_PATH }}/coverage ./coverage-reports/frontend

          BACKEND_COB="$(find ./TestResults -name 'coverage.cobertura.xml' | head -1)"
          FRONTEND_COB="${{ env.FRONTEND_PATH }}/coverage/cobertura-coverage.xml"

          python3 - "$BACKEND_COB" "$FRONTEND_COB" <<'PYEOF'
          import xml.etree.ElementTree as ET, json, sys, datetime

          def parse_cobertura(path):
              try:
                  tree = ET.parse(path)
                  root = tree.getroot()
                  return {
                      "lineRate": round(float(root.get("line-rate", 0)) * 100, 1),
                      "branchRate": round(float(root.get("branch-rate", 0)) * 100, 1),
                      "linesValid": int(root.get("lines-valid", 0)),
                      "linesCovered": int(root.get("lines-covered", 0)),
                      "branchesValid": int(root.get("branches-valid", 0)),
                      "branchesCovered": int(root.get("branches-covered", 0)),
                  }
              except Exception as e:
                  return {"error": str(e)}

          summary = {
              "generatedAt": datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"),
              "backend": parse_cobertura(sys.argv[1]),
              "frontend": parse_cobertura(sys.argv[2]),
          }
          with open("./coverage-reports/summary.json", "w") as f:
              json.dump(summary, f, indent=2)
          PYEOF

      - name: Upload coverage to Azure Blob Storage
        if: ${{ vars.COVERAGE_STORAGE_CONNECTION_STRING != '' }}
        uses: azure/CLI@v2
        with:
          inlineScript: |
            az storage blob upload-batch \
              --source ./coverage-reports \
              --destination coverage-reports \
              --connection-string "${{ vars.COVERAGE_STORAGE_CONNECTION_STRING }}" \
              --overwrite true

  deploy-dev:
    name: Deploy to Dev
    needs: [build-backend, build-frontend, test]
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend
          path: ./backend

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend
          path: ./frontend

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.BACKEND_APP_NAME }}
          package: ./backend

      - name: Deploy frontend to Azure Static Web Apps
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: ./frontend
          skip_app_build: true
