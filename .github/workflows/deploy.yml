name: Build & Deploy to Dev

on:
  workflow_dispatch:

permissions:
  actions: read
  contents: read

jobs:
  validate-deploy-inputs:
    name: Validate dev deploy inputs
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Validate required variables and secrets
        shell: bash
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          BACKEND_APP_NAME: ${{ vars.BACKEND_APP_NAME }}
          SMOKE_EMP_NO: ${{ vars.SMOKE_EMP_NO }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          SWA_DEPLOYMENT_TOKEN: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
        run: |
          set -euo pipefail
          for name in BACKEND_URL FRONTEND_URL BACKEND_APP_NAME SMOKE_EMP_NO AZURE_CREDENTIALS SWA_DEPLOYMENT_TOKEN; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required value: ${name}" >&2
              exit 1
            fi
          done

  resolve-verified-build:
    name: Resolve verified artifacts
    needs: [validate-deploy-inputs]
    runs-on: ubuntu-latest
    outputs:
      verify_run_id: ${{ steps.verify.outputs.run_id }}
      release_sha: ${{ steps.verify.outputs.release_sha }}
      backend_artifact_name: ${{ steps.verify.outputs.backend_artifact_name }}
      frontend_artifact_name: ${{ steps.verify.outputs.frontend_artifact_name }}
      manifest_artifact_name: ${{ steps.verify.outputs.manifest_artifact_name }}
    steps:
      - name: Find successful Verify Dev Build run for this commit
        id: verify
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const headSha = context.sha;
            const shortSha = headSha.substring(0, 7);

            const response = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: "verify-dev-build.yml",
              head_sha: headSha,
              status: "completed",
              per_page: 50,
            });

            const run = response.data.workflow_runs.find((wfRun) => wfRun.conclusion === "success");
            if (!run) {
              core.setFailed(
                `No successful Verify Dev Build run found for ${headSha}. ` +
                `Push to dev (or run Verify Dev Build manually) and wait for green before deploying.`
              );
              return;
            }

            core.setOutput("run_id", String(run.id));
            core.setOutput("release_sha", headSha);
            core.setOutput("backend_artifact_name", `backend-${shortSha}`);
            core.setOutput("frontend_artifact_name", `frontend-${shortSha}`);
            core.setOutput("manifest_artifact_name", `release-manifest-${shortSha}`);

  deploy-dev:
    name: Deploy to Dev
    needs: [resolve-verified-build]
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download backend artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ needs.resolve-verified-build.outputs.verify_run_id }}
          ARTIFACT_NAME: ${{ needs.resolve-verified-build.outputs.backend_artifact_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p ./backend
          for attempt in 1 2 3 4 5; do
            rm -rf ./backend/*
            if gh run download "$RUN_ID" --repo "$REPOSITORY" --name "$ARTIFACT_NAME" --dir ./backend; then
              exit 0
            fi
            if [[ "$attempt" -eq 5 ]]; then
              echo "Failed to download backend artifact '$ARTIFACT_NAME' after $attempt attempts." >&2
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Download frontend artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ needs.resolve-verified-build.outputs.verify_run_id }}
          ARTIFACT_NAME: ${{ needs.resolve-verified-build.outputs.frontend_artifact_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p ./frontend
          for attempt in 1 2 3 4 5; do
            rm -rf ./frontend/*
            if gh run download "$RUN_ID" --repo "$REPOSITORY" --name "$ARTIFACT_NAME" --dir ./frontend; then
              exit 0
            fi
            if [[ "$attempt" -eq 5 ]]; then
              echo "Failed to download frontend artifact '$ARTIFACT_NAME' after $attempt attempts." >&2
              exit 1
            fi
            sleep $((attempt * 5))
          done

      - name: Download release manifest
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ needs.resolve-verified-build.outputs.verify_run_id }}
          ARTIFACT_NAME: ${{ needs.resolve-verified-build.outputs.manifest_artifact_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p ./release
          gh run download "$RUN_ID" --repo "$REPOSITORY" --name "$ARTIFACT_NAME" --dir ./release

      - name: Download SLO perf artifacts
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ needs.resolve-verified-build.outputs.verify_run_id }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          mkdir -p ./perf/artifacts
          gh run download "$RUN_ID" --repo "$REPOSITORY" --name perf-artifacts --dir ./perf/artifacts

      - name: Enforce SLO gate before deploy
        run: python3 .github/scripts/evaluate-slo-gates.py
        env:
          SLO_PERF_SUMMARY_PATH: ./perf/artifacts/perf-summary.json
          SLO_RECON_SUMMARY_PATH: ./perf/artifacts/queue-reconciliation-summary.json

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.BACKEND_APP_NAME }}
          package: ./backend

      - name: Deploy frontend to Azure Static Web Apps
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: ./frontend
          skip_app_build: true

      - name: Re-upload backend artifact for promotions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.resolve-verified-build.outputs.backend_artifact_name }}
          path: ./backend
          retention-days: 30

      - name: Re-upload frontend artifact for promotions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.resolve-verified-build.outputs.frontend_artifact_name }}
          path: ./frontend
          retention-days: 30

      - name: Re-upload release manifest for promotions
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.resolve-verified-build.outputs.manifest_artifact_name }}
          path: ./release/manifest.json
          retention-days: 30

      - name: Release summary
        run: |
          echo "## Dev deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release SHA: \`${{ needs.resolve-verified-build.outputs.release_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Verified run ID: \`${{ needs.resolve-verified-build.outputs.verify_run_id }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend artifact: \`${{ needs.resolve-verified-build.outputs.backend_artifact_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend artifact: \`${{ needs.resolve-verified-build.outputs.frontend_artifact_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat ./release/manifest.json >> "$GITHUB_STEP_SUMMARY"

  post-deploy-smoke:
    name: Post-deploy smoke checks
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke checks
        shell: bash
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          SMOKE_EMP_NO: ${{ vars.SMOKE_EMP_NO }}
          SMOKE_EMP_PIN: ${{ secrets.SMOKE_EMP_PIN }}
        run: bash .github/scripts/post-deploy-smoke.sh
