name: Build & Deploy to Dev

on:
  workflow_dispatch:

jobs:
  validate-deploy-inputs:
    name: Validate dev deploy inputs
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Validate required variables and secrets
        shell: bash
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          BACKEND_APP_NAME: ${{ vars.BACKEND_APP_NAME }}
          SMOKE_EMP_NO: ${{ vars.SMOKE_EMP_NO }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          SWA_DEPLOYMENT_TOKEN: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
        run: |
          set -euo pipefail
          for name in BACKEND_URL FRONTEND_URL BACKEND_APP_NAME SMOKE_EMP_NO AZURE_CREDENTIALS SWA_DEPLOYMENT_TOKEN; do
            if [[ -z "${!name:-}" ]]; then
              echo "Missing required value: ${name}" >&2
              exit 1
            fi
          done

  build-release:
    name: Build release artifacts
    needs: [validate-deploy-inputs]
    uses: ./.github/workflows/build-test-package.yml
    with:
      release_ref: ${{ github.sha }}
      backend_url: ${{ vars.BACKEND_URL }}
      run_e2e: false
      coverage_storage_connection_string: ${{ vars.COVERAGE_STORAGE_CONNECTION_STRING }}
    secrets: inherit

  deploy-dev:
    name: Deploy to Dev
    needs: [build-release]
    runs-on: ubuntu-latest
    environment: dev
    concurrency:
      group: deploy-dev
      cancel-in-progress: false

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-release.outputs.backend_artifact_name }}
          path: ./backend

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-release.outputs.frontend_artifact_name }}
          path: ./frontend

      - name: Download release manifest
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-release.outputs.manifest_artifact_name }}
          path: ./release

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.BACKEND_APP_NAME }}
          package: ./backend

      - name: Deploy frontend to Azure Static Web Apps
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: ./frontend
          skip_app_build: true

      - name: Release summary
        run: |
          echo "## Dev deployment complete" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Release SHA: \`${{ needs.build-release.outputs.release_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Backend artifact: \`${{ needs.build-release.outputs.backend_artifact_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Frontend artifact: \`${{ needs.build-release.outputs.frontend_artifact_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          cat ./release/manifest.json >> "$GITHUB_STEP_SUMMARY"

  post-deploy-smoke:
    name: Post-deploy smoke checks
    needs: [deploy-dev]
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke checks
        shell: bash
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          SMOKE_EMP_NO: ${{ vars.SMOKE_EMP_NO }}
          SMOKE_EMP_PIN: ${{ secrets.SMOKE_EMP_PIN }}
        run: bash .github/scripts/post-deploy-smoke.sh
